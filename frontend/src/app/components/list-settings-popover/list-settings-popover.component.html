<ion-list>
  <ion-list-header>Opzioni Visualizzazione</ion-list-header>

  <ion-item>
    <ion-select
      label="Ordina per"
      label-placement="stacked"
      [(ngModel)]="settings.orderBy"
      (ionChange)="applica()"
    >
      <div *ngIf="type === 'clienti'">
        <ion-select-option value="id">Data di Creazione</ion-select-option>
        <ion-select-option value="nome">Nome</ion-select-option>
        <ion-select-option value="email">Email</ion-select-option>
      </div>
      <div *ngIf="type === 'cantieri'">
        <ion-select-option value="id">Data di Creazione</ion-select-option>
        <ion-select-option value="citta">Città</ion-select-option>
        <ion-select-option value="via">Via</ion-select-option>
        <ion-select-option value="cap">CAP</ion-select-option>
        <ion-select-option value="provincia">Provincia</ion-select-option>
      </div>
      <div *ngIf="type === 'commesse'">
        <ion-select-option value="id">Data di Creazione</ion-select-option>
        <ion-select-option value="seriale">Codice/Seriale</ion-select-option>
        <ion-select-option value="stato">Stato</ion-select-option>
        <ion-select-option value="valore_totale"
          >Valore Economico</ion-select-option
        >
      </div>
      <div *ngIf="type === 'appuntamenti'">
        <ion-select-option value="data_ora">Data e Ora</ion-select-option>
        <ion-select-option value="nome">Titolo</ion-select-option>
        <ion-select-option value="commessa.indirizzo.cliente.nome"
          >Cliente</ion-select-option
        >
      </div>
    </ion-select>
  </ion-item>

  <ion-item>
    <ion-select
      label="Direzione"
      label-placement="stacked"
      [(ngModel)]="settings.orderDirection"
      (ionChange)="applica()"
    >
      <ion-select-option value="asc">Crescente (A-Z)</ion-select-option>
      <ion-select-option value="desc">Decrescente (Z-A)</ion-select-option>
    </ion-select>
  </ion-item>
</ion-list>
