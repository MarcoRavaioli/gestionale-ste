<ion-header>
  <ion-toolbar color="primary">
    <ion-title>{{ isEditing ? "Modifica Appuntamento" : "Nuovo Appuntamento" }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="chiudi()">Annulla</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  
  <div class="section-box">
    <div class="header-toggle">
      <h3><ion-icon name="link-outline"></ion-icon> Collega a...</h3>
    </div>

    <ion-segment scrollable="true" [(ngModel)]="tipoCollegamento" class="ion-margin-bottom">
      <ion-segment-button value="commessa">
        <ion-label>Commessa</ion-label>
      </ion-segment-button>
      <ion-segment-button value="cantiere">
        <ion-label>Cantiere</ion-label>
      </ion-segment-button>
      <ion-segment-button value="cliente">
        <ion-label>Cliente</ion-label>
      </ion-segment-button>
      <ion-segment-button value="nessuno">
        <ion-label>Nessuno</ion-label>
      </ion-segment-button>
    </ion-segment>

    <div *ngIf="tipoCollegamento === 'commessa'" class="fade-in">
      <app-generic-selector
        label="Cerca e seleziona commessa..."
        type="commessa"
        [items]="listaCommesse"
        [(selectedId)]="selectedCommessaId">
      </app-generic-selector>
    </div>

    <div *ngIf="tipoCollegamento === 'cantiere'" class="fade-in">
      <app-generic-selector
        label="Cerca e seleziona cantiere..."
        type="cantiere"
        [items]="listaCantieri"
        [(selectedId)]="selectedCantiereId">
      </app-generic-selector>
    </div>

    <div *ngIf="tipoCollegamento === 'cliente'" class="fade-in">
      <app-generic-selector
        label="Cerca e seleziona cliente..."
        type="cliente"
        [items]="listaClienti"
        [(selectedId)]="selectedClienteId">
      </app-generic-selector>
    </div>

    <div *ngIf="tipoCollegamento === 'nessuno'" class="fade-in">
      <p style="font-size: 0.8rem; color: var(--ion-color-medium); text-align: center; margin-top: 8px;">
        Appuntamento generico (es. riunione in ufficio).
      </p>
    </div>
  </div>

  <div class="section-box ion-margin-top">
    <h3><ion-icon name="calendar-outline"></ion-icon> Dettagli Appuntamento</h3>
    <div class="form-grid">
      <ion-input
        label="Data e Ora *"
        type="datetime-local"
        label-placement="floating"
        fill="outline"
        [(ngModel)]="formDati.data_ora">
      </ion-input>

      <ion-textarea
        label="Note e Titolo Lavoro"
        label-placement="floating"
        fill="outline"
        rows="3"
        [(ngModel)]="formDati.descrizione">
      </ion-textarea>
    </div>
  </div>

  <ion-button
    expand="block"
    class="ion-margin-top"
    size="large"
    (click)="salva()"
    [disabled]="!isValid()"
  >
    {{ isEditing ? 'SALVA MODIFICHE' : 'CREA APPUNTAMENTO' }}
  </ion-button>

  <ion-button
    *ngIf="isEditing"
    expand="block"
    color="danger"
    fill="clear"
    class="ion-margin-top"
    (click)="elimina()"
  >
    <ion-icon name="trash-outline" slot="start"></ion-icon>
    Elimina Appuntamento
  </ion-button>
</ion-content>
