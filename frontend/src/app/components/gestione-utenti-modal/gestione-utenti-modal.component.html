<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Gestione Utenti</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="chiudi()">Chiudi</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding light-bg">
  <ion-list lines="full">
    @for (user of utenti(); track user.id) {
    <ion-item-sliding>
      <ion-item>
        <ion-label>
          <h2>{{ user.nome }} {{ user.cognome }}</h2>
          <p>{{ user.nickname }} <span *ngIf="user.email">- {{ user.email }}</span></p>
          <ion-chip [color]="getRoleColor(user.ruolo)" size="small">
            <ion-label>{{ user.ruolo }}</ion-label>
          </ion-chip>
        </ion-label>
        <ion-buttons slot="end">
          <ion-button fill="clear" color="primary" (click)="modifica(user)">
            <ion-icon name="pencil-outline" slot="icon-only"></ion-icon>
          </ion-button>
          <ion-button fill="clear" color="danger" (click)="elimina(user)">
            <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="elimina(user)">
          <ion-icon name="trash" slot="icon-only"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
    } @empty {
    <div class="ion-text-center ion-padding">
      <ion-spinner *ngIf="caricamento()"></ion-spinner>
      <p *ngIf="!caricamento()">Nessun utente trovato.</p>
    </div>
    }
  </ion-list>
</ion-content>
