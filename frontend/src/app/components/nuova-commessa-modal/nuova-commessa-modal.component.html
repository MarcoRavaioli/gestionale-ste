<ion-header>
  <ion-toolbar color="primary">
    <ion-title>{{
      commessaEsistente ? "Modifica Commessa" : "Nuova Commessa"
    }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="chiudi()">Annulla</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="form-grid modern-form">
    <!-- Sezione Collegamento (Nuova) -->
    <div class="form-section" style="padding: 10px; margin-bottom: 20px; border: 1px solid rgba(128,128,128,0.1); border-radius: 12px;">
      <div style="font-size: 0.8rem; font-weight: 700; color: var(--ion-color-medium); text-transform: uppercase; margin-bottom: 10px;">
        Collegamento
      </div>

      <ion-segment [(ngModel)]="tipoCollegamento" mode="ios" class="ion-margin-bottom">
        <ion-segment-button value="cantiere">
          <ion-label>Cantiere</ion-label>
        </ion-segment-button>
        <ion-segment-button value="cliente">
          <ion-label>Cliente</ion-label>
        </ion-segment-button>
      </ion-segment>

      @if (tipoCollegamento === 'cantiere') {
        <app-generic-selector
          label="Seleziona Cantiere..."
          type="cantiere"
          [items]="listaCantieri"
          [(selectedId)]="selectedCantiereId"
        ></app-generic-selector>
        <ion-button expand="block" fill="outline" size="small" (click)="apriCreazioneRapidaCantiere()" style="margin-top: 8px;">
          <ion-icon name="add" slot="start"></ion-icon> Nuovo Cantiere
        </ion-button>
      } @else {
        <app-generic-selector
          label="Seleziona Cliente..."
          type="cliente"
          [items]="listaClienti"
          [(selectedId)]="selectedClienteId"
        ></app-generic-selector>
        <ion-button expand="block" fill="outline" size="small" (click)="apriCreazioneRapidaCliente()" style="margin-top: 8px;">
          <ion-icon name="add" slot="start"></ion-icon> Nuovo Cliente
        </ion-button>
      }
    </div>

    <ion-input
      label="Seriale (es. A123456) *"
      label-placement="floating"
      fill="outline"
      [(ngModel)]="commessa.seriale"
    >
    </ion-input>

    <ion-textarea
      label="Nome Azienda *"
      label-placement="floating"
      fill="outline"
      rows="4"
      [(ngModel)]="commessa.descrizione"
    >
    </ion-textarea>

    <div style="display: flex; gap: 10px">
      <ion-input
        label="Valore (€)"
        type="number"
        label-placement="floating"
        fill="outline"
        [(ngModel)]="commessa.valore_totale"
      >
      </ion-input>

      <ion-select
        label="Stato"
        label-placement="floating"
        fill="outline"
        [(ngModel)]="commessa.stato"
      >
        <ion-select-option value="APERTA">APERTA</ion-select-option>
        <ion-select-option value="IN_CORSO">IN CORSO</ion-select-option>
        <ion-select-option value="CHIUSA">CHIUSA</ion-select-option>
      </ion-select>
    </div>

    <app-gestione-allegati
      [entityType]="'commessa'"
      [entityId]="commessaEsistente?.id"
      [allegatiEsistenti]="commessaEsistente?.allegati || []"
    >
    </app-gestione-allegati>
  </div>

  <ion-button
    expand="block"
    class="ion-margin-top"
    (click)="salva()"
    [disabled]="!commessa.seriale"
  >
    {{ commessaEsistente ? "AGGIORNA" : "CREA COMMESSA" }}
  </ion-button>
</ion-content>
