<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab3"></ion-back-button>
    </ion-buttons>
    <ion-title>Dettaglio Cliente</ion-title>

    <ion-buttons slot="end" *ngIf="hasManagerAccess()">
      @if (!isEditing()) {
      <ion-button (click)="abilitaModifica()">
        <ion-icon slot="icon-only" name="pencil"></ion-icon>
      </ion-button>
      <ion-button (click)="chiediConfermaCancellazione()" color="danger">
        <ion-icon
          slot="icon-only"
          name="trash-outline"
          style="color: #ffcccc"
        ></ion-icon>
      </ion-button>
      } @else {
      <ion-button (click)="annullaModifica()" color="light">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
      <ion-button (click)="salvaModifica()" color="warning">
        <ion-icon slot="icon-only" name="save-outline"></ion-icon>
      </ion-button>
      }
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="light-bg ion-padding">
  @if (!cliente()) {
  <div class="empty-state">
    <p>Caricamento cliente in corso...</p>
  </div>
  } @else { @if (!isEditing()) {
  <!-- 1. VIEW MODE: Info Component -->
  <app-cliente-info [cliente]="cliente()"></app-cliente-info>

  <!-- 2. VIEW MODE: Children Lists -->
  <div class="children-section fade-in">
    <app-child-list-accordion
      title="Cantieri"
      iconName="construct-outline"
      color="tertiary"
      [items]="cantieriItems()"
    >
    </app-child-list-accordion>

    <app-child-list-accordion
      title="Commesse Dirette"
      iconName="folder-outline"
      color="secondary"
      [items]="commesseDiretteItems()"
    >
    </app-child-list-accordion>

    <app-child-list-accordion
      title="Appuntamenti Diretti"
      iconName="time-outline"
      color="primary"
      [items]="appuntamentiDirettiItems()"
    >
    </app-child-list-accordion>
  </div>
  } @else {
  <!-- EDITING MODE -->
  <div class="edit-card fade-in">
    <h3>Modifica Contatto</h3>
    <div class="form-group">
      <ion-input
        label="Nome Committente"
        label-placement="stacked"
        fill="outline"
        [(ngModel)]="cliente()!.nome"
      ></ion-input>
    </div>
    <div class="form-group" style="margin-top: 16px">
      <ion-input
        label="Email"
        label-placement="stacked"
        fill="outline"
        [(ngModel)]="cliente()!.email"
      ></ion-input>
    </div>
    <div class="form-group" style="margin-top: 16px">
      <ion-input
        label="Telefono"
        label-placement="stacked"
        fill="outline"
        [(ngModel)]="cliente()!.telefono"
      ></ion-input>
    </div>
  </div>
  } }
</ion-content>
