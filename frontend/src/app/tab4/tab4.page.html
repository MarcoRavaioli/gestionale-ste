<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Impostazioni</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="light-bg">
  <div class="user-profile-header ion-padding">
    <div class="avatar">{{ userNome().charAt(0) }}</div>
    <h2>{{ userNome() }}</h2>
    <p>{{ userRole() }}</p>
  </div>

  <ion-list inset="true">
    <ion-item button (click)="openProfilo()" detail="true">
      <ion-icon
        name="person-circle-outline"
        slot="start"
        color="primary"
      ></ion-icon>
      <ion-label>Il mio Profilo</ion-label>
    </ion-item>
    <ion-item>
      <ion-icon name="moon-outline" slot="start" color="medium"></ion-icon>
      <ion-label>Dark Mode</ion-label>
      <ion-toggle
        slot="end"
        [checked]="isDarkMode()"
        (ionChange)="toggleDarkMode($event)"
      ></ion-toggle>
    </ion-item>
  </ion-list>

  <ion-list inset="true">
    <ion-item button (click)="logout()" lines="none">
      <ion-icon name="log-out-outline" slot="start" color="danger"></ion-icon>
      <ion-label color="danger">Esci</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
